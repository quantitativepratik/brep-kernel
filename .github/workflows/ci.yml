name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt -- --check

      - name: Test
        run: cargo test --locked

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: WASM release build
        run: cargo build --target wasm32-unknown-unknown --release --locked

      - name: Native viewer check
        run: cargo check --features native-viewer --bin native-viewer --locked
