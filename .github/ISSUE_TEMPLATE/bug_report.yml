name: Bug report
description: Report incorrect geometry, robustness failures, panics, or viewer issues.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the smallest model, command, or test case that reproduces the issue.
      placeholder: |
        cargo test ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        rustc --version:
        Browser/GPU, if viewer-related:
